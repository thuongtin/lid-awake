name: Bug report
description: Report a reproducible Lid Awake bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Lid Awake issue. Do not include exploit details for security-sensitive helper or `pmset` behavior here. Use the private security path in `SECURITY.md`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open Lid Awake
        2. Change ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 14.6"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Hardware model
      placeholder: "MacBook Pro 14-inch, M3 Pro"
    validations:
      required: true
  - type: dropdown
    id: power-source
    attributes:
      label: Power source
      options:
        - AC power
        - Battery power
        - Both
        - Unknown
    validations:
      required: true
  - type: dropdown
    id: helper-status
    attributes:
      label: Helper approval status
      options:
        - Not set up
        - Needs approval
        - Ready
        - Helper missing
        - Unknown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs or `pmset` output if useful. Remove private data first.
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Attach screenshots or recordings for menu bar, settings, permission, or error-state UI bugs.
