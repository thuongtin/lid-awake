name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  swift:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Print Swift version
        run: swift --version

      - name: Run CI-safe checks
        run: ./scripts/check.sh
